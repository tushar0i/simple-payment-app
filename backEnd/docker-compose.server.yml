services:
  api-services:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - BCRYPT_SALT_ROUNDS=${BCRYPT_SALT_ROUNDS}
      - PORT=${PORT}
    expose:
      - "${PORT}"
    networks:
      - projecta-internal

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      - PORT=${PORT}
      - URL=api-services:${PORT}
      - HOST=${HOST}
    depends_on:
      - api-services
    networks:
      - projecta-internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.projecta.rule=Host(`${HOST}`)"
      - "traefik.http.routers.projecta.entrypoints=websecure"
      - "traefik.http.routers.projecta.tls=true"
      - "traefik.http.routers.projecta.tls.certresolver=letsencrypt"
      - "traefik.http.services.projecta.loadbalancer.server.port=80"

networks:
  projecta-internal:
    driver: bridge
  traefik-public:
    external: true
