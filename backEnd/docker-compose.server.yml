services:
  api-services:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - BCRYPT_SALT_ROUNDS=${BCRYPT_SALT_ROUNDS}
      - PORT=${PORT}
    expose:
      - "${PORT}"
    networks:
      - sta-internal

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-services
    networks:
      - sta-internal
      - traefik-public
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routes.sta.rule=Host(${HOST})"
      - "traefik.http.routes.sta.entrypoint=websecure"
      - "traefik.http.routes.sta.tls=true"
      - "traefik.http.routes.sta.tls.certresolver=letsencrypt"
      - "traefik.http.routes.sta.loadbalance.server.port=80"

networks:
  sta-internal:
    driver: bridge
  traefik-public:
    external: true